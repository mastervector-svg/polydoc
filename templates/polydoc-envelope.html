<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — PolyDoc Envelope</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }
    .container { max-width: 760px; margin: 0 auto; }

    /* Header bar */
    .env-header {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .env-header .icon { font-size: 28px; flex-shrink: 0; }
    .env-header h1 { font-size: 20px; font-weight: 700; color: #e6edf3; }
    .env-header .meta { font-size: 12px; color: #8b949e; margin-top: 2px; }

    /* Mail part banner */
    .mail-banner {
      background: #1c2128;
      border: 1px solid #388bfd55;
      border-left: 4px solid #388bfd;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #cdd9e5;
    }

    /* Manifest info */
    .manifest-info {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .manifest-info .row { display: flex; gap: 8px; margin-bottom: 4px; color: #8b949e; }
    .manifest-info .row strong { color: #cdd9e5; min-width: 110px; }

    /* Parts section */
    .parts-heading {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* Part card */
    .part-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .part-card:hover { border-color: #388bfd55; }
    .part-top { display: flex; align-items: center; gap: 12px; }
    .part-icon { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
    .part-info { flex: 1; min-width: 0; }
    .part-label { font-size: 15px; font-weight: 600; color: #e6edf3; }
    .part-type { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .part-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; line-height: 1.6;
    }
    .badge-compressed { background: #1f4a2b; color: #56d364; border: 1px solid #238636; }
    .badge-encrypted  { background: #3d1d1d; color: #f85149; border: 1px solid #8b1a1a; }
    .badge-lazy       { background: #2d2a1f; color: #e3b341; border: 1px solid #9e6a03; }
    .badge-slot       { background: #1c2128; color: #79c0ff; border: 1px solid #388bfd; }
    .badge-filled     { background: #1f4a2b; color: #56d364; border: 1px solid #238636; }
    .badge-size       { background: #1c2128; color: #8b949e; border: 1px solid #30363d; }

    /* Actions */
    .part-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid; transition: opacity 0.15s, background 0.15s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #238636; border-color: #238636; color: #fff; }
    .btn-secondary { background: #21262d; border-color: #30363d; color: #cdd9e5; }
    .btn-warning   { background: #9e6a0330; border-color: #9e6a03; color: #e3b341; }
    .btn-danger    { background: #8b1a1a20; border-color: #8b1a1a; color: #f85149; }

    /* Key input area */
    .key-input-area {
      display: none;
      margin-top: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
    }
    .key-input-area.visible { display: block; }
    .key-input-area input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      margin-bottom: 8px;
    }
    .key-input-area input:focus { outline: none; border-color: #388bfd; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #30363d;
    }
    .modal-head h2 { font-size: 16px; font-weight: 600; color: #e6edf3; }
    .modal-close {
      background: none; border: none; color: #8b949e;
      font-size: 20px; cursor: pointer; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    .modal-close:hover { background: #21262d; color: #e6edf3; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

    /* Content renderers */
    .content-markdown h1, .content-markdown h2, .content-markdown h3 {
      color: #e6edf3; margin: 16px 0 8px; font-weight: 600;
    }
    .content-markdown h1 { font-size: 20px; }
    .content-markdown h2 { font-size: 17px; }
    .content-markdown h3 { font-size: 15px; }
    .content-markdown p { color: #cdd9e5; margin: 8px 0; }
    .content-markdown ul, .content-markdown ol { color: #cdd9e5; padding-left: 20px; margin: 8px 0; }
    .content-markdown li { margin: 4px 0; }
    .content-markdown code {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 4px; padding: 2px 6px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13px; color: #79c0ff;
    }
    .content-markdown pre {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; padding: 16px; overflow-x: auto; margin: 12px 0;
    }
    .content-markdown pre code { background: none; border: none; padding: 0; }
    .content-markdown strong { color: #e6edf3; }
    .content-markdown em { color: #79c0ff; }
    .content-markdown a { color: #388bfd; }
    .content-json {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; padding: 16px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13px; color: #a5d6ff; overflow-x: auto; white-space: pre;
    }
    .content-plain {
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; padding: 16px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13px; color: #cdd9e5; white-space: pre-wrap; word-break: break-word;
    }
    .content-frame { width: 100%; height: 500px; border: 1px solid #30363d; border-radius: 8px; background: #fff; }
    .content-image { max-width: 100%; border-radius: 8px; }
    .content-download { text-align: center; padding: 32px; color: #8b949e; font-size: 14px; }
    .content-download .dl-btn { display: inline-block; margin-top: 16px; }

    /* Signature info */
    .sig-box {
      background: #1c2128; border: 1px solid #238636; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 20px; font-size: 12px; color: #56d364;
      display: flex; gap: 10px; align-items: center;
    }

    /* Footer */
    .env-footer { margin-top: 40px; text-align: center; font-size: 12px; color: #484f58; }
    .env-footer a { color: #388bfd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">

    <div class="env-header">
      <div class="icon">📬</div>
      <div>
        <h1 id="env-title">—</h1>
        <div class="meta" id="env-meta">—</div>
      </div>
    </div>

    <div class="sig-box" id="sig-box" style="display:none;">
      ✅ <span id="sig-text">Podpis manifestu ověřen</span>
    </div>

    <div class="mail-banner" id="mail-banner" style="display:none;">
      <div id="mail-banner-content"></div>
    </div>

    <div class="manifest-info" id="manifest-info" style="display:none;">
      <div class="row"><strong>Doc ID</strong><span id="info-docid">—</span></div>
      <div class="row"><strong>Vytvořeno</strong><span id="info-created">—</span></div>
      <div class="row" id="info-sender-row" style="display:none;">
        <strong>Odesílatel</strong><span id="info-sender">—</span>
      </div>
      <div class="row" id="info-recipients-row" style="display:none;">
        <strong>Příjemci</strong><span id="info-recipients">—</span>
      </div>
    </div>

    <div class="parts-heading">Části zásilky</div>
    <div id="parts-list"></div>

    <div class="env-footer">
      <a href="https://github.com/mastervector-svg/polydoc" target="_blank">PolyDoc</a>
      · poly/1.0 · MIT · Envelope formát
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modal-title">Část</h2>
        <button class="modal-close" id="modal-close" title="Zavřít">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="application/poly+json" id="raw-data">
{{ENVELOPE_JSON}}
  </script>

  <script>
  (function() {
    'use strict';

    function parseDoc() {
      try { return JSON.parse(document.getElementById('raw-data').textContent); }
      catch(e) { console.error('[PolyEnvelope] Failed to parse JSON:', e); return null; }
    }

    function resolveLabel(val) {
      if (!val) return '';
      if (typeof val === 'string') return val;
      const lang = navigator.language?.split('-')[0] || 'en';
      return val[lang] ?? val['en'] ?? val['cs'] ?? Object.values(val)[0] ?? '';
    }

    function iconForType(mimeType, encrypted, lazy, slot, slotState) {
      if (slot && slotState !== 'filled') return '🔲';
      if (encrypted) return '🔒';
      if (lazy) return '⏳';
      if (!mimeType) return '📁';
      if (mimeType.startsWith('image/')) return '🖼️';
      if (mimeType === 'text/markdown') return '📄';
      if (mimeType === 'application/json') return '📋';
      if (mimeType === 'application/zip') return '📦';
      if (mimeType === 'application/polydoc') return '📎';
      if (mimeType === 'application/pdf') return '📑';
      if (mimeType.startsWith('text/')) return '📄';
      return '📁';
    }

    function fmtSize(bytes) {
      if (!bytes || bytes === 0) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function decompressData(base64str) {
      const binary = Uint8Array.from(atob(base64str), c => c.charCodeAt(0));
      const ds = new DecompressionStream('deflate');
      const writer = ds.writable.getWriter();
      writer.write(binary);
      writer.close();
      const chunks = [];
      const reader = ds.readable.getReader();
      let done, value;
      while (!({done, value} = await reader.read(), done)) chunks.push(value);
      const total = chunks.reduce((n, c) => n + c.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;
      for (const c of chunks) { out.set(c, offset); offset += c.length; }
      return new TextDecoder().decode(out);
    }

    async function getPartContent(partMeta, partsData) {
      const inline = partsData?.find(p => p.id === partMeta.id);
      if (partMeta.lazy && !inline) {
        if (!partMeta.src && !partMeta.fill?.src) throw new Error('Lazy part has no src URL');
        const res = await fetch(partMeta.src || partMeta.fill.src);
        if (!res.ok) throw new Error('Fetch failed: ' + res.status);
        return await res.text();
      }
      if (!inline || !inline.data) throw new Error('No data found for part: ' + partMeta.id);
      let data = inline.data;
      if (inline.compressed || partMeta.compressed) data = await decompressData(data);
      else data = atob(data);
      return data;
    }

    function renderMarkdown(md) {
      let html = md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```[\s\S]*?```/g, m => '<pre><code>' + m.slice(3, -3).replace(/^\w+\n/, '') + '</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/^[*-] (.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/^---$/gm, '<hr style="border-color:#30363d;margin:16px 0;">')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
      html = html.replace(/(<li>[\s\S]*?<\/li>(?:\s*<br>\s*<li>[\s\S]*?<\/li>)*)/g, '<ul>$1</ul>');
      return '<div class="content-markdown"><p>' + html + '</p></div>';
    }

    const overlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    document.getElementById('modal-close').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function openModal(title, bodyHtml) {
      modalTitle.textContent = title;
      modalBody.innerHTML = bodyHtml;
      overlay.classList.add('open');
    }

    function closeModal() {
      overlay.classList.remove('open');
      modalBody.innerHTML = '';
    }

    function renderContentInModal(title, content, mimeType) {
      let html;
      if (mimeType === 'text/markdown') {
        html = renderMarkdown(content);
      } else if (mimeType === 'application/json') {
        let pretty = content;
        try { pretty = JSON.stringify(JSON.parse(content), null, 2); } catch(_) {}
        html = '<div class="content-json">' + pretty.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
      } else if (mimeType === 'text/html') {
        const blob = new Blob([content], {type: 'text/html'});
        html = '<iframe class="content-frame" sandbox="allow-scripts allow-same-origin" src="' + URL.createObjectURL(blob) + '"></iframe>';
      } else if (mimeType && mimeType.startsWith('image/')) {
        html = '<img class="content-image" src="data:' + mimeType + ';base64,' + btoa(content) + '" alt="image">';
      } else if (mimeType === 'text/plain' || (mimeType && mimeType.startsWith('text/'))) {
        html = '<div class="content-plain">' + content.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
      } else {
        const blob = new Blob([content], {type: mimeType || 'application/octet-stream'});
        html = '<div class="content-download">'
          + '<div>Typ ' + (mimeType || 'neznámý') + ' nelze zobrazit přímo.</div>'
          + '<a class="btn btn-primary dl-btn" href="' + URL.createObjectURL(blob) + '" download="' + title.replace(/\s+/g,'_') + '">⬇ Stáhnout</a>'
          + '</div>';
      }
      openModal(title, html);
    }

    function buildPartCard(partMeta, partsData) {
      const card = document.createElement('div');
      card.className = 'part-card';

      const label = resolveLabel(partMeta.label) || partMeta.id;
      const isSlot = partMeta.slot === true;
      const slotState = partMeta.slot_state ?? 'empty';
      const isFilled = isSlot && slotState === 'filled';
      const icon = iconForType(partMeta.type, partMeta.encrypted, partMeta.lazy, isSlot, slotState);

      const badges = [];
      if (isSlot && !isFilled) badges.push('<span class="badge badge-slot">slot · ' + slotState + '</span>');
      if (isFilled)            badges.push('<span class="badge badge-filled">✓ filled</span>');
      if (partMeta.compressed) badges.push('<span class="badge badge-compressed">compressed</span>');
      if (partMeta.encrypted)  badges.push('<span class="badge badge-encrypted">encrypted</span>');
      if (partMeta.lazy)       badges.push('<span class="badge badge-lazy">lazy</span>');
      if (partMeta.size_original) {
        const sOrig = fmtSize(partMeta.size_original);
        const sStored = fmtSize(partMeta.size_stored);
        badges.push('<span class="badge badge-size">'
          + (partMeta.size_stored && partMeta.size_stored !== partMeta.size_original ? sOrig + ' → ' + sStored : sOrig)
          + '</span>');
      }

      card.innerHTML = '<div class="part-top">'
        + '<div class="part-icon">' + icon + '</div>'
        + '<div class="part-info">'
        +   '<div class="part-label">' + label.replace(/</g,'&lt;') + '</div>'
        +   '<div class="part-type">' + (partMeta.type || '').replace(/</g,'&lt;') + '</div>'
        +   (badges.length ? '<div class="part-badges">' + badges.join('') + '</div>' : '')
        + '</div>'
        + '</div>'
        + '<div class="part-actions" id="actions-' + partMeta.id + '"></div>'
        + '<div class="key-input-area" id="key-area-' + partMeta.id + '">'
        +   '<input type="password" placeholder="AES-256-GCM key (hex/base64)..." id="key-input-' + partMeta.id + '">'
        +   '<button class="btn btn-danger" id="key-submit-' + partMeta.id + '">🔓 Decrypt</button>'
        + '</div>';

      const actionsEl = card.querySelector('#actions-' + partMeta.id);

      if (isSlot && !isFilled) {
        // Empty slot — nothing to open
        const info = document.createElement('span');
        info.style.cssText = 'font-size:12px;color:#8b949e;padding:4px 0;';
        info.textContent = partMeta.fill_prompt
          ? '🤖 ' + partMeta.fill_prompt.slice(0, 80) + (partMeta.fill_prompt.length > 80 ? '…' : '')
          : 'Awaiting fill via API or workspace';
        actionsEl.appendChild(info);
      } else if (partMeta.encrypted) {
        const keyBtn = document.createElement('button');
        keyBtn.className = 'btn btn-warning';
        keyBtn.textContent = '🔑 Enter key';
        keyBtn.addEventListener('click', () => {
          card.querySelector('#key-area-' + partMeta.id).classList.toggle('visible');
        });
        actionsEl.appendChild(keyBtn);
        card.querySelector('#key-submit-' + partMeta.id).addEventListener('click', async () => {
          const keyInput = card.querySelector('#key-input-' + partMeta.id);
          if (!keyInput.value.trim()) { keyInput.focus(); return; }
          renderContentInModal(label, '[AES-256-GCM decryption: SubtleCrypto implementation required. Key received: ' + keyInput.value.slice(0,8) + '...]', 'text/plain');
        });
      } else if (partMeta.lazy && !partsData?.find(p => p.id === partMeta.id)) {
        const loadBtn = document.createElement('button');
        loadBtn.className = 'btn btn-secondary';
        loadBtn.textContent = '⬇ Load';
        loadBtn.addEventListener('click', async () => {
          loadBtn.disabled = true; loadBtn.textContent = '⏳ Loading…';
          try {
            renderContentInModal(label, await getPartContent(partMeta, partsData), partMeta.type);
          } catch(err) {
            loadBtn.textContent = '❌ ' + err.message; loadBtn.disabled = false;
          }
        });
        actionsEl.appendChild(loadBtn);
      } else {
        const openBtn = document.createElement('button');
        openBtn.className = 'btn btn-primary';
        openBtn.textContent = '📂 Open';
        openBtn.addEventListener('click', async () => {
          openBtn.disabled = true; openBtn.textContent = '⏳ Loading…';
          try {
            renderContentInModal(label, await getPartContent(partMeta, partsData), partMeta.type);
          } catch(err) {
            alert('Error: ' + err.message);
          } finally {
            openBtn.textContent = '📂 Open'; openBtn.disabled = false;
          }
        });
        actionsEl.appendChild(openBtn);
      }

      return card;
    }

    function init() {
      const doc = parseDoc();
      if (!doc) { document.getElementById('env-title').textContent = 'Error: cannot parse envelope'; return; }

      const h = doc.header || {};
      const manifest = doc.manifest || {};
      const partsData = doc.parts || [];

      const title = resolveLabel(manifest.label) || h.doc_id || 'PolyDoc Envelope';
      document.getElementById('env-title').textContent = title;
      document.title = title + ' — PolyDoc Envelope';

      const metaParts = [];
      if (h.doc_id) metaParts.push(h.doc_id);
      if (h.created) { try { metaParts.push(new Date(h.created).toLocaleString()); } catch(_) { metaParts.push(h.created); } }
      if (h.doc_type) metaParts.push('poly/1.0 · ' + h.doc_type);
      document.getElementById('env-meta').textContent = metaParts.join(' · ');

      document.getElementById('manifest-info').style.display = '';
      document.getElementById('info-docid').textContent = h.doc_id || '—';
      document.getElementById('info-created').textContent = h.created ? new Date(h.created).toLocaleString() : '—';

      if (manifest.sender?.hint) {
        document.getElementById('info-sender-row').style.display = '';
        document.getElementById('info-sender').textContent = manifest.sender.hint;
      }
      if (manifest.recipients?.length) {
        document.getElementById('info-recipients-row').style.display = '';
        document.getElementById('info-recipients').textContent = manifest.recipients.length + ' recipient(s) — anonymous key hints';
      }
      if (h.signature?.value) {
        document.getElementById('sig-box').style.display = '';
        document.getElementById('sig-text').textContent = 'Manifest signed · ' + (h.signature.algorithm || 'ES256') + ' · ' + (h.signature.covers || 'manifest');
      }
      if (doc.mail_part?.data) {
        document.getElementById('mail-banner').style.display = '';
        document.getElementById('mail-banner-content').innerHTML = doc.mail_part.data;
      }

      const listEl = document.getElementById('parts-list');
      const manifestParts = manifest.parts || [];
      if (manifestParts.length === 0) {
        listEl.innerHTML = '<div style="color:#8b949e;padding:20px 0;">No parts in envelope.</div>';
        return;
      }
      for (const partMeta of manifestParts) {
        listEl.appendChild(buildPartCard(partMeta, partsData));
      }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();

  })();
  </script>
</body>
</html>
