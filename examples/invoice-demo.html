<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolyDoc — Invoice Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       POLY INTERPRETER CSS v1.0
       ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --poly-primary: #0d6efd;
      --poly-accent: #ffc107;
      --poly-success: #198754;
      --poly-warning: #856404;
      --poly-danger: #842029;
      --poly-bg: #eef0f4;
      --poly-page: #ffffff;
      --poly-text: #1c1e26;
      --poly-muted: #6b7280;
      --poly-border: #e5e7eb;
      --poly-radius: 8px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--poly-bg);
      color: var(--poly-text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Toolbar ─────────────────────────────────── */
    #poly-toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--poly-text);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06);
    }
    .tb-left { display: flex; align-items: center; gap: 12px; }
    .poly-logo {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--poly-primary), #6366f1);
      color: white;
      padding: 4px 10px;
      border-radius: 5px;
      text-transform: uppercase;
    }
    #tb-title {
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem;
      font-weight: 400;
    }
    .tb-right { display: flex; gap: 6px; }
    .tb-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.16); color: white; }
    .tb-btn.accent {
      background: var(--poly-primary);
      border-color: var(--poly-primary);
      color: white;
    }
    .tb-btn.accent:hover { background: #0b5ed7; }
    .tb-btn.lang {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
    }
    .tb-btn.lang:hover { background: rgba(255,255,255,0.22); }

    /* ── Page Wrap ───────────────────────────────── */
    .poly-wrap {
      padding: 80px 24px 64px;
      display: flex; justify-content: center;
    }
    .poly-page {
      width: 210mm;
      min-height: 297mm;
      background: var(--poly-page);
      box-shadow: 0 4px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      padding: 52px 56px;
      position: relative;
      border-radius: 2px;
    }

    /* ── Banner ──────────────────────────────────── */
    .poly-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      border-radius: var(--poly-radius);
      margin-bottom: 28px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .poly-banner.success { background: #dcfce7; color: #14532d; border: 1px solid #bbf7d0; }
    .poly-banner.warning { background: #fef9c3; color: #713f12; border: 1px solid #fde68a; }
    .poly-banner.danger  { background: #fee2e2; color: #7f1d1d; border: 1px solid #fecaca; }
    .poly-banner.info    { background: #dbeafe; color: #1e3a5f; border: 1px solid #bfdbfe; }

    /* ── Doc Header ──────────────────────────────── */
    .poly-doc-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 2px solid var(--poly-border);
    }
    .poly-doc-header h1 {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--poly-primary);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .poly-doc-meta { text-align: right; }
    .poly-doc-meta p {
      font-size: 0.85rem;
      color: var(--poly-muted);
      margin-bottom: 3px;
    }
    .poly-doc-meta strong { color: var(--poly-text); }

    /* ── Parties ─────────────────────────────────── */
    .poly-parties {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin: 28px 0;
    }
    .poly-party {
      padding: 18px 20px;
      border: 1px solid var(--poly-border);
      border-radius: var(--poly-radius);
      background: #fafafa;
    }
    .poly-party-role {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--poly-primary);
      margin-bottom: 8px;
    }
    .poly-party-name { font-weight: 600; font-size: 1rem; margin-bottom: 6px; }
    .poly-party-detail { font-size: 0.83rem; color: var(--poly-muted); line-height: 1.7; }
    .poly-party-detail .iban {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 4px;
    }

    /* ── Table ───────────────────────────────────── */
    .poly-table-wrap { margin: 28px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      background: var(--poly-primary);
      color: white; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 10px 14px; text-align: left;
    }
    thead th:first-child { border-radius: 6px 0 0 0; }
    thead th:last-child  { border-radius: 0 6px 0 0; text-align: right; }
    tbody td { padding: 10px 14px; border-bottom: 1px solid var(--poly-border); }
    tbody td:last-child { text-align: right; font-family: 'DM Mono', monospace; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8faff; }
    tfoot td {
      padding: 9px 14px;
      font-size: 0.86rem;
    }
    tfoot tr:not(:last-child) td {
      color: var(--poly-muted);
      border-top: 1px solid var(--poly-border);
    }
    tfoot tr:last-child td {
      background: var(--poly-primary);
      color: white;
      font-weight: 700;
      font-size: 1rem;
    }
    tfoot tr:last-child td:first-child { border-radius: 0 0 0 6px; }
    tfoot tr:last-child td:last-child  { border-radius: 0 0 6px 0; text-align: right; }
    tfoot td:last-child { text-align: right; font-family: 'DM Mono', monospace; }

    /* ── Image ───────────────────────────────────── */
    .poly-image { margin: 24px 0; }
    .poly-image img { max-width: 100%; border-radius: 6px; display: block; }
    .poly-image figcaption {
      font-size: 0.78rem; color: var(--poly-muted);
      margin-top: 6px; font-style: italic;
    }

    /* ── Rich Text ───────────────────────────────── */
    .poly-rich {
      margin: 24px 0;
      padding: 16px 20px;
      border-left: 3px solid var(--poly-accent);
      background: #fffbeb;
      border-radius: 0 6px 6px 0;
      font-size: 0.88rem; color: #4b4b2f;
      line-height: 1.75;
    }

    /* ── Checklist ───────────────────────────────── */
    .poly-checklist { list-style: none; margin: 20px 0; }
    .poly-checklist li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.88rem;
    }
    .poly-checklist li:last-child { border-bottom: none; }
    .chk {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--poly-border); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .chk.on { background: var(--poly-success); border-color: var(--poly-success); color: white; }
    .chk.on + span { color: var(--poly-muted); text-decoration: line-through; }

    /* ── Paragraph ───────────────────────────────── */
    .poly-p { margin: 16px 0; font-size: 0.9rem; color: var(--poly-muted); }

    /* ── Actions ─────────────────────────────────── */
    .poly-actions { margin: 28px 0; display: flex; gap: 10px; flex-wrap: wrap; }
    .poly-action-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      padding: 10px 20px; border-radius: 7px;
      border: none; cursor: pointer;
      background: var(--poly-primary); color: white;
      transition: all 0.15s;
    }
    .poly-action-btn:hover { background: #0b5ed7; transform: translateY(-1px); }
    .poly-action-btn:active { transform: none; }

    /* ── Divider ─────────────────────────────────── */
    .poly-divider { border: none; border-top: 1px solid var(--poly-border); margin: 24px 0; }

    /* ── Doc Footer ──────────────────────────────── */
    .poly-doc-footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--poly-border);
      display: flex; justify-content: space-between;
      font-size: 0.72rem; color: #c0c0c0;
      font-family: 'DM Mono', monospace;
    }
    .poly-doc-footer a { color: #c0c0c0; text-decoration: none; }
    .poly-doc-footer a:hover { color: var(--poly-primary); }

    /* ── PolyDoc Badge ───────────────────────────── */
    .poly-badge {
      margin-top: 40px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #f0f4ff, #f8f0ff);
      border: 1px solid #dde3f7;
      border-radius: var(--poly-radius);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.78rem; color: #555;
      font-family: 'DM Mono', monospace;
    }
    .poly-badge-left { display: flex; align-items: center; gap: 10px; }
    .poly-badge-logo {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--poly-primary), #6366f1);
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .poly-badge a { color: var(--poly-primary); text-decoration: none; }
    .poly-badge a:hover { text-decoration: underline; }

    /* ── Agent View ─────────────────────────────── */
    body.agent-mode {
      background: #0d1117;
      color: #c9d1d9;
    }
    body.agent-mode #poly-toolbar {
      background: #010409;
      border-bottom: 1px solid #30363d;
    }
    body.agent-mode .poly-wrap { background: #0d1117; }
    body.agent-mode .poly-page {
      background: #161b22;
      border: 1px solid #30363d;
      box-shadow: 0 0 40px rgba(0,255,65,0.06);
    }
    #agent-view { display: none; }
    body.agent-mode #app,
    body.agent-mode #poly-banner,
    body.agent-mode .poly-actions,
    body.agent-mode .poly-badge { display: none; }
    body.agent-mode #agent-view { display: block; }

    .agent-header {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #3fb950;
      text-transform: uppercase;
      padding: 12px 0 20px;
      border-bottom: 1px solid #21262d;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .agent-header::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: #3fb950;
      border-radius: 50%;
      box-shadow: 0 0 8px #3fb950;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .agent-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8b949e;
      margin: 28px 0 8px;
    }
    .agent-json {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 18px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
    }
    /* JSON syntax colors */
    .j-key   { color: #79c0ff; }
    .j-str   { color: #a5d6ff; }
    .j-num   { color: #79c0ff; }
    .j-bool  { color: #ff7b72; }
    .j-null  { color: #8b949e; }
    .j-punc  { color: #8b949e; }

    .agent-endpoints {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .agent-endpoint {
      background: #010409;
      border: 1px solid #21262d;
      border-left: 3px solid #3fb950;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
    }
    .agent-endpoint .ep-method { color: #3fb950; font-weight: 700; margin-right: 10px; }
    .agent-endpoint .ep-url    { color: #a5d6ff; }
    .agent-endpoint .ep-label  { color: #8b949e; font-size: 0.7rem; margin-top: 4px; }
    .agent-endpoint .ep-action { color: #ffa657; font-size: 0.7rem; }

    .agent-fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .agent-field {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
    }
    .agent-field .af-key  { color: #79c0ff; }
    .agent-field .af-val  { color: #a5d6ff; display: block; margin-top: 2px; }
    .agent-field .af-type { color: #6e7681; font-size: 0.65rem; }

    #btn-agent { transition: background 0.2s; }
    body.agent-mode #btn-agent {
      background: #3fb950;
      color: #010409;
      font-weight: 700;
    }

    /* ── Print ───────────────────────────────────── */
    @media print {
      #poly-toolbar { display: none; }
      body { background: white; }
      .poly-wrap { padding: 0; }
      .poly-page { box-shadow: none; width: 100%; min-height: unset; padding: 20mm; }
      .poly-actions { display: none; }
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 860px) {
      .poly-wrap { padding: 72px 12px 48px; }
      .poly-page { width: 100%; min-height: unset; padding: 36px 28px; }
    }
    @media (max-width: 640px) {
      /* Toolbar */
      #poly-toolbar { height: auto; flex-wrap: wrap; padding: 10px 14px; gap: 8px; }
      .tb-left { flex: 1 0 100%; }
      .tb-right { flex-wrap: wrap; gap: 5px; }
      .tb-btn { padding: 6px 10px; font-size: 0.76rem; }
      #tb-title { display: none; }

      /* Page */
      .poly-wrap { padding: 70px 8px 32px; }
      .poly-page { padding: 24px 16px; border-radius: 0; }

      /* Parties */
      .poly-parties { grid-template-columns: 1fr; }
      .poly-doc-header { flex-direction: column; gap: 12px; }
      .poly-doc-meta { text-align: left; }

      /* Table — horizontal scroll */
      .poly-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .poly-table { min-width: 480px; }

      /* Agent view */
      .agent-fields { grid-template-columns: 1fr 1fr; }
      .agent-json { font-size: 0.72rem; }
    }
    @media (max-width: 400px) {
      .tb-right { gap: 4px; }
      .tb-btn { padding: 5px 8px; font-size: 0.72rem; }
      .agent-fields { grid-template-columns: 1fr; }
    }
  </style>
</head>

        "api_url": "https://api.example.cz/doc/INV-2026-042/status",
        "target_field": "is_paid"
      }
    ],
    "conditions": [
      {
        "field": "is_paid",
        "value": true,
        "banner": { "text_key": "status_paid", "style": "success" }
      },
      {
        "field": "is_paid",
        "value": false,
        "banner": { "text_key": "status_waiting", "style": "warning" }
      }
    ],
    "actions": [
      {
        "label_key": "btn_confirm",
        "api_url": "https://api.example.cz/doc/INV-2026-042/confirm",
        "method": "POST",
        "success_key": "demo_confirmed"
      }
    ],
    "demo_state": { "is_paid": false }
  }
}
</script>

<!-- Toolbar -->
<div id="poly-toolbar">
  <div class="tb-left">
    <span class="poly-logo">Poly</span>
    <span id="tb-title">…</span>
  </div>
  <div class="tb-right">
    <button class="tb-btn lang" id="lang-btn" onclick="PolyDoc.switchLang()">🌐 EN</button>
    <button class="tb-btn" id="btn-agent" onclick="PolyDoc.toggleAgentView()" title="Switch between Human view and Agent/LLM view">👤 Human</button>
    <button class="tb-btn" id="btn-demo" onclick="PolyDoc.toggleDemo()">🔄 Toggle status</button>
    <button class="tb-btn" id="btn-verify" onclick="PolyDoc.verify()">🔏 Verify</button>
    <button class="tb-btn" id="btn-json" onclick="PolyDoc.exportJSON()">⬇ JSON</button>
    <button class="tb-btn accent" id="btn-print" onclick="window.print()">🖨 Print / PDF</button>
  </div>
</div>

<!-- Page -->
<div class="poly-wrap">
  <div class="poly-page">
    <div id="poly-banner"></div>
    <div id="app">Loading…</div>
    <div id="agent-view"></div>
    <div class="poly-doc-footer">
      <span id="footer-id"></span>
      <span id="footer-spec"></span>
    </div>
    <div class="poly-badge" id="poly-badge">
      <div class="poly-badge-left">
        <span class="poly-badge-logo">Poly</span>
        <span>Built with <strong>PolyDoc v1.0</strong> · Open format · One file, machine-readable + human-readable</span>
      </div>
      <a href="https://github.com/mastervector-svg/polydoc" target="_blank">github.com/mastervector-svg/polydoc</a>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     POLY INTERPRETER v1.0  (bilingual / i18n edition)
     ══════════════════════════════════════════════════════ -->
<script>
const PolyDoc = (() => {
  let _doc = null, _state = {}, _lang = 'en';

  // ── Helpers ────────────────────────────────────────────
  const esc = s => String(s ?? '').replace(/[&<>"']/g,
    m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);

  const fmt = (n, cur) => Number(n).toLocaleString('en-US') + (cur ? ' ' + cur : '');

  /**
   * t(val) — resolve a localizable value.
   * If val is an object, returns val[_lang] || val['en'] || first value.
   * If val is a string or number, returns it as-is.
   */
  function t(val) {
    if (val === null || val === undefined) return '';
    if (typeof val === 'object' && !Array.isArray(val)) {
      return val[_lang] ?? val['en'] ?? val[Object.keys(val)[0]] ?? '';
    }
    return String(val);
  }

  /**
   * i18n(key) — resolve a UI label from the i18n block.
   * Falls back to English, then the raw key.
   */
  function i18n(key) {
    return _doc?.i18n?.[_lang]?.[key]
        ?? _doc?.i18n?.['en']?.[key]
        ?? key;
  }

  // ── Renderers ──────────────────────────────────────────
  function renderSection(s) {
    switch (s.type) {
      case 'header':    return renderDocHeader(s);
      case 'party':     return '__PARTY__' + JSON.stringify(s);
      case 'table':     return renderTable(s);
      case 'image':     return renderImage(s);
      case 'rich_text': return `<div class="poly-rich">${s.html || ''}</div>`;
      case 'checklist': return renderChecklist(s);
      case 'paragraph': return `<p class="poly-p">${esc(t(s.text))}</p>`;
      case 'divider':   return '<hr class="poly-divider">';
      case 'signature_block': return renderSignatureBlock(s);
      case 'custom':    return `<pre style="font-size:.78rem;padding:12px;background:#f8f8f8;border-radius:6px">${esc(JSON.stringify(s.data, null, 2))}</pre>`;
      default: return `<pre style="color:red;font-size:.8rem">[unknown section type: ${esc(s.type)}]</pre>`;
    }
  }

  function renderDocHeader(s) {
    const els = s.elements || [];
    const h1 = els.find(e => e.type === 'heading');
    const paras = els.filter(e => e.type === 'paragraph');
    return `
      <div class="poly-doc-header">
        <div>${h1 ? `<h1>${esc(t(h1.text))}</h1>` : ''}</div>
        <div class="poly-doc-meta">${paras.map(p => `<p>${esc(t(p.text))}</p>`).join('')}</div>
      </div>`;
  }

  function renderPartyCard(s) {
    const d = s.data || {};
    const roleLabel = i18n(s.role) || s.role;
    return `<div class="poly-party">
      <div class="poly-party-role">${esc(roleLabel)}</div>
      <div class="poly-party-name">${esc(d.name)}</div>
      <div class="poly-party-detail">
        ID: ${esc(d.id || '–')}<br>${esc(d.address || '')}
        ${d.bank ? `<br><span class="iban">${esc(d.bank)}</span>` : ''}
        ${d.email ? `<br>${esc(d.email)}` : ''}
      </div>
    </div>`;
  }

  function renderTable(s) {
    const cols = s.columns || [];
    let h = `<div class="poly-table-wrap"><table><thead><tr>`;
    cols.forEach(c => h += `<th>${esc(t(c))}</th>`);
    h += `</tr></thead><tbody>`;
    (s.rows || []).forEach(r => {
      h += '<tr>';
      r.forEach(cell => h += `<td>${esc(t(cell))}</td>`);
      h += '</tr>';
    });
    h += '</tbody>';
    if (s.footer) {
      const f = s.footer, span = cols.length - 1;
      const vat = Math.round(f.total * (f.vat_rate || 0) / 100);
      h += `<tfoot>
        <tr><td colspan="${span}">${esc(i18n('subtotal'))}</td><td>${fmt(f.total, f.currency)}</td></tr>
        <tr><td colspan="${span}">${esc(i18n('vat'))} ${f.vat_rate}%</td><td>${fmt(vat, f.currency)}</td></tr>
        <tr><td colspan="${span}">${esc(i18n('total_due'))}</td><td>${fmt(f.total + vat, f.currency)}</td></tr>
      </tfoot>`;
    }
    return h + '</table></div>';
  }

  function renderImage(s) {
    return `<figure class="poly-image">
      <img src="${esc(s.src)}" alt="${esc(t(s.alt) || '')}" style="width:${esc(s.width || 'auto')}">
      ${s.caption ? `<figcaption>${esc(t(s.caption))}</figcaption>` : ''}
    </figure>`;
  }

  function renderChecklist(s) {
    return '<ul class="poly-checklist">' +
      (s.items || []).map(item => `<li>
        <div class="chk ${item.checked ? 'on' : ''}">${item.checked ? '✓' : ''}</div>
        <span>${esc(t(item.text))}</span>
      </li>`).join('') + '</ul>';
  }

  function renderSignatureBlock(s) {
    return `<div style="margin:32px 0;padding:20px;border:1px dashed var(--poly-border);border-radius:var(--poly-radius);min-height:80px;display:flex;align-items:flex-end">
      <span style="font-size:0.8rem;color:var(--poly-muted)">${esc(t(s.label))}</span>
    </div>`;
  }

  function renderActions(actions) {
    if (!actions?.length) return '';
    return '<div class="poly-actions">' +
      actions.map(a => {
        const label = a.label_key ? i18n(a.label_key) : (a.label || a.label_key || 'Action');
        const successMsg = a.success_key ? i18n(a.success_key) : (a.success_message || 'Done!');
        return `<button class="poly-action-btn" onclick="PolyDoc.doAction(${JSON.stringify(a.api_url)}, ${JSON.stringify(a.method || 'POST')}, ${JSON.stringify(successMsg)})">${esc(label)}</button>`;
      }).join('') +
      '</div>';
  }

  // ── Party grid assembly ────────────────────────────────
  function resolveParties(parts) {
    const markers = parts.filter(p => p.startsWith('__PARTY__'));
    if (!markers.length) return parts;
    const grid = `<div class="poly-parties">${markers.map(m => renderPartyCard(JSON.parse(m.slice(9)))).join('')}</div>`;
    let done = false;
    return parts.map(p => {
      if (!p.startsWith('__PARTY__')) return p;
      if (!done) { done = true; return grid; }
      return '';
    });
  }

  // ── Visuals ────────────────────────────────────────────
  function applyVisuals(v) {
    if (!v?.colors) return;
    const r = document.documentElement;
    if (v.colors.primary) r.style.setProperty('--poly-primary', v.colors.primary);
    if (v.colors.accent)  r.style.setProperty('--poly-accent', v.colors.accent);
  }

  // ── Logic ──────────────────────────────────────────────
  function evalConditions() {
    const slot = document.getElementById('poly-banner');
    if (!slot) return;
    slot.innerHTML = '';
    for (const c of (_doc.logic?.conditions || [])) {
      if (_state[c.field] === c.value && c.banner) {
        const bannerText = c.banner.text_key
          ? i18n(c.banner.text_key)
          : (c.banner.text || '');
        slot.innerHTML = `<div class="poly-banner ${c.banner.style || 'info'}">${esc(bannerText)}</div>`;
        break;
      }
    }
  }

  async function fetchDynamicData() {
    for (const d of (_doc.logic?.dynamic || [])) {
      try {
        const url = d.api_url.replace('{doc_id}', _doc.header?.doc_id || '');
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          if (d.target_field && data[d.target_field] !== undefined) {
            _state[d.target_field] = data[d.target_field];
          }
        }
      } catch (_) { /* API unavailable — using demo_state */ }
    }
    evalConditions();
  }

  // ── Render full document into #app ─────────────────────
  function renderDoc() {
    const app = document.getElementById('app');
    if (!app) return;

    let parts = (_doc.content?.sections || []).map(renderSection);
    parts = resolveParties(parts);

    const actionsHtml = renderActions(_doc.logic?.actions);
    app.innerHTML = parts.join('') + actionsHtml;

    evalConditions();
  }

  // ── Agent View ─────────────────────────────────────────
  function syntaxHighlight(obj) {
    const json = JSON.stringify(obj, null, 2);
    return json.replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],])/g,
      match => {
        if (/^"/.test(match)) {
          if (/:$/.test(match)) return `<span class="j-key">${match}</span>`;
          return `<span class="j-str">${match}</span>`;
        }
        if (/true|false/.test(match)) return `<span class="j-bool">${match}</span>`;
        if (/null/.test(match))       return `<span class="j-null">${match}</span>`;
        if (/[{}\[\]]/.test(match))   return `<span class="j-punc">${match}</span>`;
        return `<span class="j-num">${match}</span>`;
      }
    );
  }

  function renderAgentView() {
    const el = document.getElementById('agent-view');
    if (!el || !_doc) return;

    // Key fields from header + metadata
    const fields = [
      { key: 'format',    val: _doc.header?.format,    type: 'string' },
      { key: 'doc_id',    val: _doc.header?.doc_id,    type: 'string' },
      { key: 'doc_type',  val: _doc.header?.doc_type,  type: 'string' },
      { key: 'created',   val: _doc.header?.created,   type: 'datetime' },
      { key: 'language',  val: _doc.metadata?.language, type: 'BCP 47' },
      { key: 'languages', val: JSON.stringify(_doc.metadata?.languages), type: 'string[]' },
      { key: 'title',     val: JSON.stringify(_doc.metadata?.title),     type: 'LocalizedString' },
      { key: 'sections',  val: (_doc.content?.sections?.length || 0) + ' items', type: 'Section[]' },
    ];

    const fieldsHtml = `<div class="agent-fields">${fields.map(f =>
      `<div class="agent-field">
        <span class="af-key">${esc(f.key)}</span>
        <span class="af-val">${esc(String(f.val ?? '—'))}</span>
        <span class="af-type">${esc(f.type)}</span>
      </div>`
    ).join('')}</div>`;

    // Actions → API endpoints
    const actions = _doc.logic?.actions || [];
    const endpointsHtml = actions.length
      ? `<div class="agent-endpoints">${actions.map(a => {
          const label = a.label_key ? i18n(a.label_key) : (a.label || '');
          return `<div class="agent-endpoint">
            <span class="ep-method">${esc(a.method || 'POST')}</span>
            <span class="ep-url">${esc(a.api_url || '')}</span>
            <div class="ep-label">Action: <span class="ep-action">${esc(label)}</span></div>
          </div>`;
        }).join('')}</div>`
      : '<div style="color:#6e7681;font-family:monospace;font-size:0.8rem;">No actions defined</div>';

    // Full JSON
    const fullJson = syntaxHighlight(_doc);

    el.innerHTML = `
      <div class="agent-header">LLM / Agent view — reading raw-data from &lt;script type="application/poly+json"&gt;</div>

      <div class="agent-section-label">Document metadata</div>
      ${fieldsHtml}

      <div class="agent-section-label">API endpoints (logic.actions)</div>
      ${endpointsHtml}

      <div class="agent-section-label">Full JSON payload</div>
      <div class="agent-json">${fullJson}</div>
    `;
  }

  // ── Toolbar i18n update ────────────────────────────────
  function updateToolbar() {
    const langBtn = document.getElementById('lang-btn');
    if (langBtn) langBtn.textContent = '🌐 ' + _lang.toUpperCase();

    const btnDemo   = document.getElementById('btn-demo');
    const btnVerify = document.getElementById('btn-verify');
    const btnJson   = document.getElementById('btn-json');
    const btnPrint  = document.getElementById('btn-print');

    if (btnDemo)   btnDemo.textContent   = i18n('btn_demo');
    if (btnVerify) btnVerify.textContent = i18n('btn_verify');
    if (btnJson)   btnJson.textContent   = i18n('btn_json');
    if (btnPrint)  btnPrint.textContent  = i18n('btn_print');
  }

  // ── Init ───────────────────────────────────────────────
  function init() {
    const raw = document.getElementById('raw-data')?.textContent;
    const app = document.getElementById('app');
    if (!raw) { if (app) app.innerHTML = '<p style="color:red">Error: poly data not found</p>'; return; }
    try { _doc = JSON.parse(raw); }
    catch (e) { if (app) app.innerHTML = `<p style="color:red">JSON parse error: ${e.message}</p>`; return; }

    // Set initial language from metadata
    _lang = _doc.metadata?.language || 'en';

    // Metadata / toolbar title
    const titleVal = _doc.metadata?.title;
    const titleStr = titleVal ? t(titleVal) : (_doc.header?.doc_id || 'PolyDoc');
    document.title = titleStr;
    const tbTitle = document.getElementById('tb-title');
    if (tbTitle) tbTitle.textContent = titleStr;

    const footerId = document.getElementById('footer-id');
    if (footerId) footerId.textContent =
      `${_doc.header?.doc_id || ''} · ${_doc.header?.format || 'poly/1.0'} · ${_doc.header?.created?.slice(0, 10) || ''}`;

    const footerSpec = document.getElementById('footer-spec');
    if (footerSpec) {
      const specUrl = _doc.header?.spec;
      const format  = _doc.header?.format || 'poly/1.0';
      footerSpec.innerHTML = specUrl
        ? `<a href="${specUrl}" target="_blank" rel="noopener">📄 spec ${format}</a> · <a href="https://github.com/mastervector-svg/polydoc" target="_blank" rel="noopener">github.com/mastervector-svg/polydoc</a>`
        : `PolyDoc · <a href="https://github.com/mastervector-svg/polydoc" target="_blank" rel="noopener">github.com/mastervector-svg/polydoc</a>`;
    }

    applyVisuals(_doc.visuals);
    _state = { ..._doc.logic?.demo_state };

    renderDoc();
    updateToolbar();
    fetchDynamicData();
  }

  // ── Public API ─────────────────────────────────────────
  return {
    init,
    getDoc: () => _doc,
    getLang: () => _lang,

    /** Cycle to the next language in metadata.languages */
    switchLang() {
      const langs = _doc?.metadata?.languages;
      if (!langs || langs.length < 2) return;
      const idx = langs.indexOf(_lang);
      _lang = langs[(idx + 1) % langs.length];

      // Re-render document
      renderDoc();
      updateToolbar();

      // Update page title & html lang attribute
      const titleVal = _doc.metadata?.title;
      const titleStr = titleVal ? t(titleVal) : (_doc.header?.doc_id || 'PolyDoc');
      document.title = titleStr;
      const tbTitle = document.getElementById('tb-title');
      if (tbTitle) tbTitle.textContent = titleStr;
      document.documentElement.lang = _lang;
    },

    toggleAgentView() {
      const isAgent = document.body.classList.toggle('agent-mode');
      const btn = document.getElementById('btn-agent');
      if (btn) btn.textContent = isAgent ? '🤖 Agent' : '👤 Human';
      if (isAgent) renderAgentView();
    },

    toggleDemo() {
      _state.is_paid = !_state.is_paid;
      evalConditions();
    },

    async doAction(url, method, successMsg) {
      try {
        await fetch(url, { method });
        alert(successMsg);
      } catch (_) {
        alert(successMsg + '\n\n(Demo: would POST to ' + url + ')');
      }
    },

    exportJSON() {
      const raw = document.getElementById('raw-data').textContent.trim();
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([raw], { type: 'application/json' })),
        download: `${_doc?.header?.doc_id || 'polydoc'}.json`
      });
      a.click();
    },

    verify() {
      const sig = _doc?.header?.signature;
      alert(sig
        ? '✅ Document has an ES256 signature\nAlgorithm: ' + sig.algorithm + '\n\n(SubtleCrypto verification — implemented in PolyDoc v1.1)'
        : '⚠️ This document has no digital signature.\nFor invoices and contracts we recommend adding one.');
    }
  };
})();

document.addEventListener('DOMContentLoaded', () => PolyDoc.init());
</script>
</body>
